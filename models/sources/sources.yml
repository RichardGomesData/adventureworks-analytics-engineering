version: 2

sources:
  - name: adventure_works
    description: Dados transacionais do banco Adventure Works utilizados para modelagem analítica.
    catalog: fea_academy
    schema: adventure_works

    tables:

      - name: sales_salesorderheader
        description: Tabela fonte com informações gerais dos pedidos de venda.
        columns:
          - name: salesorderid
            description: Chave primária da tabela sales_salesorderheader.

      - name: sales_salesorderdetail
        description: Tabela fonte com os itens de cada pedido de venda.
        columns:
          - name: salesorderdetailid
            description: Chave primária da tabela sales_salesorderdetail.


      - name: sales_customer
        description: Tabela fonte com informações dos clientes.
        columns:
          - name: customerid
            description: Chave primária da tabela sales_customer.


      - name: sales_salesorderheadersalesreason
        description: Tabela que relaciona pedidos de venda aos motivos da venda.
        columns:
          - name: salesorderid
            description: Chave que relaciona com sales_salesorderheader.

      - name: sales_salesreason
        description: Tabela fonte com os motivos de venda.
        columns:
          - name: salesreasonid
            description: Chave primária da tabela sales_salesreason.


      - name: sales_salesperson
        description: Tabela fonte com informações dos vendedores.
        columns:
          - name: businessentityid
            description: Chave primária da tabela sales_salesperson.


      - name: sales_creditcard
        description: Tabela fonte com informações dos cartões de crédito utilizados nas vendas.
        columns:
          - name: creditcardid
            description: Chave primária da tabela sales_creditcard.


      - name: person_person
        description: Tabela fonte com informações pessoais de clientes e colaboradores.
        columns:
          - name: businessentityid
            description: Chave primária da tabela person_person.


      - name: person_address
        description: Tabela fonte com informações de endereço.
        columns:
          - name: addressid
            description: Chave primária da tabela person_address.


      - name: person_businessentityaddress
        description: Tabela de relação entre entidades de negócio e endereços.
        columns:
          - name: businessentityid
            description: Identificador da entidade de negócio.

      - name: person_stateprovince
        description: Tabela fonte com informações de estados ou províncias.
        columns:
          - name: stateprovinceid
            description: Chave primária da tabela person_stateprovince.


      - name: person_countryregion
        description: Tabela fonte com informações de países.
        columns:
          - name: countryregioncode
            description: Chave primária da tabela person_countryregion.


      - name: production_product
        description: Tabela fonte com informações de produtos.
        columns:
          - name: productid
            description: Chave primária da tabela production_product.


      - name: production_productsubcategory
        description: Tabela fonte com subcategorias de produtos.
        columns:
          - name: productsubcategoryid
            description: Chave primária da tabela production_productsubcategory.
 

      - name: production_productcategory
        description: Tabela fonte com categorias de produtos.
        columns:
          - name: productcategoryid
            description: Chave primária da tabela production_productcategory.


      - name: humanresources_employee
        description: Tabela fonte com informações dos colaboradores da empresa.
        columns:
          - name: businessentityid
            description: Chave primária da tabela humanresources_employee.