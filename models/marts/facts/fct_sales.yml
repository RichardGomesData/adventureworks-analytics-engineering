version: 2

models:
  - name: fct_sales
    description: Tabela fato de vendas no nível de item de pedido, contendo métricas financeiras e chaves para dimensões.

    columns:

      - name: pk_sales
        tests:
          - unique
          - not_null

      - name: fk_product
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_product')
                field: pk_product

      - name: fk_customer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: pk_customer

      - name: fk_sales_person
        tests:
          - relationships:
              arguments:
                to: ref('dim_sales_person')
                field: pk_sales_person

      - name: fk_sales_reason
        tests:
          - relationships:
              arguments:
                to: ref('dim_sales_reason')
                field: pk_sales_reason
              config:
                where: fk_sales_reason is not null

      - name: fk_credit_card
        tests:
          - relationships:
              arguments:
                to: ref('dim_credit_card')
                field: pk_cartao_credito

      - name: fk_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: pk_date

      - name: quantity
      - name: unit_price
      - name: discount
      - name: gross_amount
      - name: net_amount