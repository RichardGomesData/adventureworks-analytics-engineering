version: 2

models:
  - name: stg_person_state_province
    description: Staging table for states and provinces.

    columns:

      - name: pk_state_province
        description: Primary key of the state or province.
        tests:
          - unique
          - not_null

      - name: codigo_state_province
        description: State or province code.
        tests:
          - not_null

      - name: fk_country_region
        description: Foreign key referencing the country or region.
        tests:
          - not_null

      - name: nome_estado
        description: Name of the state or province.
        tests:
          - not_null

      - name: fk_territory
        description: Foreign key referencing the sales territory.

      - name: ts_modificacao
        description: Timestamp of the last modification.