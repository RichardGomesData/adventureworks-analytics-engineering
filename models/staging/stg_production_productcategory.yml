version: 2

models:
  - name: stg_production_productcategory
    description: Staging table for product categories.

    columns:

      - name: pk_productcategory
        description: Primary key of the product category.
        tests:
          - unique
          - not_null

      - name: nome_categoria
        description: Name of the product category.
        tests:
          - not_null

      - name: guid_registro
        description: Unique row identifier.

      - name: ts_modificacao
        description: Timestamp of the last modification.