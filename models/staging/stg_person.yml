version: 2

models:
  - name: stg_person
    description: Staging table for persons.

    columns:

      - name: pk_person
        description: Primary key of the person.
        tests:
          - unique
          - not_null

      - name: tipo_pessoa
        description: Type of person (customer, employee, etc).
        tests:
          - not_null

      - name: primeiro_nome
        description: First name of the person.

      - name: sobrenome
        description: Last name of the person.

      - name: ts_modificacao
        description: Timestamp of the last modification.