version: 2

models:
  - name: int_sales_reason
    description: Tabela intermediate que relaciona pedidos aos motivos de venda.

    columns:

      - name: fk_salesorder
        description: Identificador do pedido associado ao motivo de venda.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_sales_salesorderheader')
                field: pk_pedido

      - name: pk_salesreason
        description: Identificador do motivo de venda.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_sales_salesreason')
                field: pk_salesreason

      - name: nome_motivo_venda
        description: Nome do motivo da venda.

      - name: tipo_motivo_venda
        description: Tipo do motivo da venda.