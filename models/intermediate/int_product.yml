version: 2

models:
  - name: int_product
    description: Tabela intermediate que consolida informações de produtos, subcategorias e categorias.

    columns:

      - name: pk_product
        description: Chave primária do produto.
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('stg_production_product')
                field: pk_product

      - name: nome_produto
        description: Nome do produto.

      - name: numero_produto
        description: Código do produto.

      - name: cor
        description: Cor do produto.

      - name: pk_product_subcategory
        description: Identificador da subcategoria do produto.
        tests:
          - relationships:
              arguments:
                to: ref('stg_production_product_subcategory')
                field: pk_product_subcategory

      - name: nome_subcategoria
        description: Nome da subcategoria do produto.

      - name: pk_product_category
        description: Identificador da categoria do produto.
        tests:
          - relationships:
              arguments:
                to: ref('stg_production_product_category')
                field: pk_product_category

      - name: nome_categoria
        description: Nome da categoria do produto.